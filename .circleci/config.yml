version: 2.1

orbs:
  cypress: cypress-io/cypress@3

jobs:
  update-algolia-index:
    executor:
      name: cypress/default
      node-version: "22.16.0"
    steps:
      - checkout
      - run: yarn install
      - run: yarn update-algolia-index

  unit-tests:
    executor:
      name: cypress/default
      node-version: "22.16.0"
    steps:
      - checkout
      - restore_cache:
          keys:
            - yarn-cache-{{ checksum "yarn.lock" }}
            - yarn-cache-
      - run: yarn install
      - save_cache:
          key: yarn-cache-{{ checksum "yarn.lock" }}
          paths:
            - ~/.cache/yarn
      - run: yarn types
      - run: yarn lint
      - run: yarn test:unit

  # Build the Next.js site exactly once and share the output (.next + the
  # next-sitemap output in public) with every downstream job via a workspace.
  build:
    executor:
      name: cypress/default
      node-version: "22.16.0"
    steps:
      - cypress/install:
          package-manager: "yarn"
          install-browsers: true
          post-install: "yarn cypress info && yarn build"
      - persist_to_workspace:
          root: .
          paths:
            - .next
            - public

  ui-tests-chrome:
    executor:
      name: cypress/default
      node-version: "22.16.0"
    parallelism: 6
    steps:
      # Restores deps/browsers/Cypress binary from the orb's cache; the build
      # output is pulled from the workspace instead of rebuilt here.
      - cypress/install:
          package-manager: "yarn"
          install-browsers: true
      - attach_workspace:
          at: .
      - cypress/run-tests:
          start-command: "yarn start"
          cypress-command: |
            if [[ -v CYPRESS_RECORD_KEY ]]; then
              # internal PR
              npx cypress run --browser chrome --parallel --record --key $CYPRESS_RECORD_KEY --group "Desktop"
            else
              npx cypress run --browser chrome
            fi

  ui-tests-chrome-mobile:
    executor:
      name: cypress/default
      node-version: "22.16.0"
    parallelism: 6
    steps:
      - cypress/install:
          package-manager: "yarn"
          install-browsers: true
      - attach_workspace:
          at: .
      - cypress/run-tests:
          start-command: "yarn start"
          cypress-command: |
            if [[ -v CYPRESS_RECORD_KEY ]]; then
              # internal PR
              npx cypress run --browser chrome --config viewportWidth=375,viewportHeight=667 --parallel --record --key $CYPRESS_RECORD_KEY --group "Mobile"
            else
              npx cypress run --browser chrome --config viewportWidth=375,viewportHeight=667
            fi

  check-links:
    executor:
      name: cypress/default
      node-version: "22.16.0"
    steps:
      - checkout
      - restore_cache:
          keys:
            - yarn-cache-{{ checksum "yarn.lock" }}
            - yarn-cache-
      - run: yarn install
      - save_cache:
          key: yarn-cache-{{ checksum "yarn.lock" }}
          paths:
            - ~/.cache/yarn
      - attach_workspace:
          at: .
      - run:
          name: Start server
          command: yarn start
          background: true
      - run:
          name: Wait for server
          command: |
            for i in $(seq 1 60); do
              if curl -sSf http://localhost:3000 > /dev/null 2>&1; then
                echo "Server is up"
                exit 0
              fi
              echo "Waiting for server... ($i)"
              sleep 2
            done
            echo "Server did not start in time"
            exit 1
      - run:
          name: Check for Broken Links
          command: "yarn check:links"

workflows:
  run-unit-tests:
    jobs:
      - unit-tests
  build-and-cypress-test:
    jobs:
      - build
      - ui-tests-chrome:
          name: "UI Tests - Chrome"
          requires:
            - build
      - ui-tests-chrome-mobile:
          name: "UI Tests - Chrome - Mobile"
          requires:
            - build
      - check-links:
          requires:
            - build

nightly:
  triggers:
    - schedule:
        cron: "0 0 * * *"
        filters:
          branches:
            only:
              - main
  jobs:
    - update-algolia-index
